<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>告白網站</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background-color: #000; color: #fff; font-family: sans-serif; overflow: hidden; flex-direction: column; }
        .modal { background: #222; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 0 30px rgba(255,255,255,0.1); z-index: 10; width: 350px; }
        .buttons { margin-top: 30px; display: flex; justify-content: space-between; align-items: center; position: relative; height: 60px; width: 100%; }
        .btn { padding: 12px 35px; font-size: 18px; cursor: pointer; border: none; border-radius: 8px; transition: transform 0.1s; }
        .agree { background-color: #ff4d4d; color: #fff; }
        .disagree { background-color: #555; color: #fff; position: absolute; right: 0; transition: all 0.3s ease-out; z-index: 999; }
        .hidden { display: none; }
        .congrats { text-align: center; z-index: 5; position: absolute; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
    </style>
</head>
<body>
    <div id="modal" class="modal">
        <h2>你願意跟我在一起嗎?</h2>
        <div class="buttons">
            <button id="agree" class="btn agree">同意</button>
            <button id="disagree" class="btn disagree">不同意</button>
        </div>
    </div>
    <div id="congrats" class="congrats hidden">
        <h1>恭喜! ❤️</h1>
    </div>
    <canvas id="fireworks"></canvas>

    <script>
        const d = document.getElementById('disagree');
        const a = document.getElementById('agree');
        const m = document.getElementById('modal');
        const c = document.getElementById('congrats');
        const v = document.getElementById('fireworks');
        const t = v.getContext('2d');
        let p = []; let f = [];

        d.addEventListener('mouseover', () => {
            d.style.left = Math.random() * (window.innerWidth - d.offsetWidth) + 'px';
            d.style.top = Math.random() * (window.innerHeight - d.offsetHeight) + 'px';
        });

        a.onclick = () => {
            m.classList.add('hidden');
            c.classList.remove('hidden');
            v.width = window.innerWidth;
            v.height = window.innerHeight;
            loop();
        };

        function loop() {
            requestAnimationFrame(loop);
            t.fillStyle = 'rgba(0,0,0,0.2)';
            t.fillRect(0, 0, v.width, v.height);
            if (Math.random() < 0.05) {
                f.push({ x: Math.random() * v.width, y: v.height, ty: Math.random() * v.height * 0.4, v: Math.random() * 6 + 8, c: `hsl(${Math.random() * 360}, 100%, 60%)` });
            }
            for (let i = f.length - 1; i >= 0; i--) {
                let fw = f[i]; fw.y -= fw.v; t.fillStyle = fw.c; t.beginPath(); t.arc(fw.x, fw.y, 3, 0, Math.PI * 2); t.fill();
                if (fw.y <= fw.ty) {
                    for (let j = 0; j < 60; j++) { p.push({ x: fw.x, y: fw.y, vx: (Math.random() - 0.5) * 15, vy: (Math.random() - 0.5) * 15, l: Math.random() * 30 + 50, c: fw.c }); }
                    f.splice(i, 1);
                }
            }
            for (let i = p.length - 1; i >= 0; i--) {
                let pt = p[i]; pt.x += pt.vx; pt.y += pt.vy; pt.vy += 0.25; pt.l--;
                t.globalAlpha = Math.max(0, pt.l / 80); t.fillStyle = pt.c; t.beginPath(); t.arc(pt.x, pt.y, 2, 0, Math.PI * 2); t.fill(); t.globalAlpha = 1;
                if (pt.l <= 0) p.splice(i, 1);
            }
        }
    </script>
</body>
</html>
