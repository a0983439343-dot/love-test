<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>告白網站 PRO</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: black;
    overflow: hidden;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

.modal {
    background: rgba(30,30,30,0.95);
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    width: 360px;
    z-index: 10;
    box-shadow: 0 0 40px rgba(255,255,255,0.1);
    transition: 0.5s;
}

h2 {
    min-height: 40px;
}

.btn {
    padding: 12px 30px;
    border: none;
    border-radius: 10px;
    font-size: 18px;
    cursor: pointer;
}

.agree {
    background: #ff3b3b;
    color: white;
}

.disagree {
    position: fixed;
    left: 0;
    top: 0;
    background: #555;
    color: white;
    z-index: 999;
    transition: 0.05s;
}

.hidden {
    opacity: 0;
    transform: scale(0.9);
    pointer-events: none;
}

.congrats {
    position: absolute;
    font-size: 40px;
    z-index: 5;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    pointer-events: none;
}

.fade {
    opacity: 0;
    transform: scale(1.1);
}
</style>
</head>

<body>

<div id="modal" class="modal">
    <h2 id="text"></h2>
    <div style="margin-top:20px;">
        <button id="agree" class="btn agree">同意</button>
    </div>
</div>

<button id="disagree" class="btn disagree">不同意</button>

<div id="congrats" class="congrats hidden">❤️ 我就知道你會答應</div>

<canvas id="fireworks"></canvas>

<audio id="bgm" loop>
    <source src="https://cdn.pixabay.com/audio/2022/10/16/audio_12b6b3b5b0.mp3">
</audio>

<script>
const d = document.getElementById('disagree');
const a = document.getElementById('agree');
const m = document.getElementById('modal');
const c = document.getElementById('congrats');
const v = document.getElementById('fireworks');
const t = v.getContext('2d');
const text = document.getElementById('text');
const bgm = document.getElementById('bgm');

let p = [];
let f = [];

let x = 100, y = 100;
let dx = 4, dy = 3;

let msg = "你願意跟我在一起嗎？";
let i = 0;

function type(){
    if(i < msg.length){
        text.innerHTML += msg[i];
        i++;
        setTimeout(type, 80);
    }
}
type();

function resize(){
    v.width = innerWidth;
    v.height = innerHeight;
}
resize();
addEventListener('resize', resize);

function move(){
    x += dx;
    y += dy;

    if(x < 0 || x > innerWidth - 120) dx *= -1;
    if(y < 0 || y > innerHeight - 50) dy *= -1;

    d.style.left = x + "px";
    d.style.top = y + "px";

    requestAnimationFrame(move);
}
move();

d.addEventListener('mouseenter', () => {
    dx = (Math.random()-0.5)*14;
    dy = (Math.random()-0.5)*14;
});

a.onclick = () => {
    bgm.play().catch(()=>{});
    m.classList.add('fade');

    setTimeout(() => {
        m.style.display = "none";
        c.classList.remove('hidden');
    }, 500);

    loop();
};

function loop(){
    requestAnimationFrame(loop);

    t.globalCompositeOperation = 'destination-out';
    t.fillStyle = 'rgba(0,0,0,0.08)';
    t.fillRect(0,0,v.width,v.height);

    t.globalCompositeOperation = 'lighter';

    if(Math.random() < 0.06){
        f.push({
            x: Math.random()*v.width,
            y: v.height,
            ty: Math.random()*v.height*0.6,
            v: Math.random()*4+7,
            c: `hsl(${Math.random()*360},100%,60%)`
        });
    }

    for(let i=f.length-1;i>=0;i--){
        let fw = f[i];
        fw.y -= fw.v;

        t.fillStyle = fw.c;
        t.fillRect(fw.x, fw.y, 2, 2);

        if(fw.y <= fw.ty){
            for(let j=0;j<70;j++){
                let angle = Math.random()*Math.PI*2;
                let speed = Math.random()*6+2;

                p.push({
                    x: fw.x,
                    y: fw.y,
                    vx: Math.cos(angle)*speed,
                    vy: Math.sin(angle)*speed,
                    life: 90,
                    c: fw.c
                });
            }
            f.splice(i,1);
        }
    }

    for(let i=p.length-1;i>=0;i--){
        let pt = p[i];

        pt.x += pt.vx;
        pt.y += pt.vy;

        pt.vx *= 0.985;
        pt.vy *= 0.985;
        pt.vy += 0.05;

        pt.life--;

        let a = pt.life / 90;
        if(a <= 0){
            p.splice(i,1);
            continue;
        }

        t.globalAlpha = a;
        t.fillStyle = pt.c;
        t.fillRect(pt.x, pt.y, 2, 2);
    }

    t.globalAlpha = 1;

    if(p.length > 800) p.splice(0, 200);
}
</script>

</body>
</html>
